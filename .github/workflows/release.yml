name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build binaries
        env:
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          GOOS=darwin GOARCH=arm64 go build -trimpath -ldflags="-s -w" -o dist/token-agent-darwin-arm64 ./cmd/agent-token
          GOOS=darwin GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o dist/token-agent-darwin-amd64 ./cmd/agent-token
          GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o dist/token-agent-linux-amd64 ./cmd/agent-token
          GOOS=linux GOARCH=arm64 go build -trimpath -ldflags="-s -w" -o dist/token-agent-linux-arm64 ./cmd/agent-token
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
